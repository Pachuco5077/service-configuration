checkout.property=Checkout Profile Dev

# Spring Data
spring.datasource.name=checkoutdb
spring.jpa.show-sql=true

# Spring Data MySQL and JPA
spring.datasource.url=jdbc:mysql://localhost:3306/entumovil_service_backend_checkout
spring.datasource.username=root
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update


# jwt
jwt.oauth.convertet.principle-attribute=preferred_username
jwt.oauth.convertet.resource-id=entumovil-service-backend-checkout


## logging
loggin.level.org.keycloak=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{dd-MM-yyyy HH:mm:ss} %magenta([%thread]) %highlight(%-5level) %logger.%M - %msg%n


